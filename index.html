<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Olawuyi — Full-Stack Engineer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #16a34a;
      --accent-hi: #22c55e;
      --display: 'Space Grotesk', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--mono);
      background-color: #ffffff;
      color: #0a0a0a;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #fff; }
    ::-webkit-scrollbar-thumb { background: var(--accent); }
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s cubic-bezier(.2,.8,.2,1), transform 0.75s cubic-bezier(.2,.8,.2,1);
    }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    @keyframes shimmer { to { background-position: 200% center; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    @keyframes load { 0% { width: 0; } 100% { width: 100%; } }
    .nav-link {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: #999; transition: color 0.15s;
    }
    .nav-link:hover { color: var(--accent); }
    .pill {
      display: inline-block; padding: 4px 12px; border: 1px solid #e5e5e5;
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #666; transition: all 0.15s; cursor: pointer;
      background: none; font-family: var(--mono);
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); background: #f0fdf4; }
    .pill.active { border-color: var(--accent); color: #fff; background: var(--accent); }
    .cta-primary {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px;
      background: #0a0a0a; color: #fff; font-family: var(--mono); font-size: 10px;
      font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;
      border: 1.5px solid #0a0a0a; transition: all 0.2s; cursor: pointer;
    }
    .cta-primary:hover { background: var(--accent); border-color: var(--accent); }
    .cta-outline {
      display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px;
      background: transparent; color: #0a0a0a; font-family: var(--mono); font-size: 10px;
      font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;
      border: 1.5px solid #d0d0d0; transition: all 0.2s; cursor: pointer;
    }
    .cta-outline:hover { border-color: var(--accent); color: var(--accent); }
    .section-num { font-size: 11px; font-weight: 700; color: #ccc; letter-spacing: 0.1em; }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script>
    const scrollRevealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.07 });

    const observeExisting = () => {
      document.querySelectorAll('.reveal:not(.visible)').forEach(el => scrollRevealObserver.observe(el));
    };

    observeExisting();
    const domObserver = new MutationObserver(() => observeExisting());
    domObserver.observe(document.body, { childList: true, subtree: true });
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
