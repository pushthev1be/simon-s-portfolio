
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLASSIFIED // Simon Olawuyi Dossier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --terminal-green: #22c55e;
      --terminal-dim: #166534;
      --error-red: #ef4444;
    }
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #000000;
      color: var(--terminal-green);
      overflow-x: hidden;
    }
    
    /* CRT Scanline Effect */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 1000;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 1001;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.27861; }
      5% { opacity: 0.34769; }
      10% { opacity: 0.23604; }
      15% { opacity: 0.90626; }
      20% { opacity: 0.18128; }
      25% { opacity: 0.83891; }
      30% { opacity: 0.65583; }
      35% { opacity: 0.57807; }
      40% { opacity: 0.26559; }
      45% { opacity: 0.84693; }
      50% { opacity: 0.96019; }
      55% { opacity: 0.08523; }
      60% { opacity: 0.71056; }
      65% { opacity: 0.73477; }
      70% { opacity: 0.85823; }
      75% { opacity: 0.13329; }
      80% { opacity: 0.90651; }
      85% { opacity: 0.11603; }
      90% { opacity: 0.16236; }
      95% { opacity: 0.5698; }
      100% { opacity: 0.77387; }
    }

    /* Tactical HUD Frames */
    .hud-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--terminal-dim);
    }
    .hud-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .hud-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .hud-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .hud-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

    /* Reveal Animation Classes */
    .reveal {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .shimmer-text {
      background: linear-gradient(90deg, var(--terminal-dim) 25%, var(--terminal-green) 50%, var(--terminal-dim) 75%);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes stamp-appear {
      0% { opacity: 0; transform: scale(3) rotate(-15deg); filter: blur(10px); }
      15% { opacity: 0.6; transform: scale(1) rotate(-15deg); filter: blur(0px); }
      85% { opacity: 0.6; transform: scale(1) rotate(-15deg); filter: blur(0px); }
      100% { opacity: 0; transform: scale(0.9) rotate(-15deg); filter: blur(2px); }
    }

    .classified-stamp {
      font-weight: 900;
      border: 4px solid #ef4444;
      color: #ef4444;
      padding: 4px 12px;
      text-transform: uppercase;
      transform: rotate(-15deg);
      opacity: 0.2;
      pointer-events: none;
      user-select: none;
    }

    .classified-stamp-animated {
      font-weight: 900;
      border: 6px solid #ef4444;
      color: #ef4444;
      padding: 8px 24px;
      text-transform: uppercase;
      transform: rotate(-15deg);
      pointer-events: none;
      user-select: none;
      opacity: 0;
      animation: stamp-appear 8s infinite cubic-bezier(0.19, 1, 0.22, 1);
      background: rgba(239, 68, 68, 0.05);
      letter-spacing: 0.2em;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script>
    const observerOptions = { threshold: 0.1 };
    const scrollRevealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, observerOptions);

    const observeExisting = () => {
      document.querySelectorAll('.reveal:not(.active)').forEach(el => scrollRevealObserver.observe(el));
    };

    observeExisting();
    const domObserver = new MutationObserver(() => observeExisting());
    domObserver.observe(document.body, { childList: true, subtree: true });
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
