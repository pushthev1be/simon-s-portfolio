<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Olawuyi — Full-Stack Engineer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #16a34a;
      --accent-light: #22c55e;
      --accent-dim: #bbf7d0;
    }
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #ffffff;
      color: #0f172a;
      overflow-x: hidden;
    }

    /* Tactical HUD Frames */
    .hud-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid #d1d5db;
    }
    .hud-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .hud-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .hud-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .hud-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }

    /* Reveal Animation */
    .reveal {
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }

    .shimmer-text {
      background: linear-gradient(90deg, #166534 25%, #16a34a 50%, #166534 75%);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes stamp-appear {
      0% { opacity: 0; transform: scale(3) rotate(-15deg); filter: blur(10px); }
      15% { opacity: 0.15; transform: scale(1) rotate(-15deg); filter: blur(0px); }
      85% { opacity: 0.15; transform: scale(1) rotate(-15deg); filter: blur(0px); }
      100% { opacity: 0; transform: scale(0.9) rotate(-15deg); filter: blur(2px); }
    }

    .classified-stamp {
      font-weight: 900;
      border: 4px solid #ef4444;
      color: #ef4444;
      padding: 4px 12px;
      text-transform: uppercase;
      transform: rotate(-15deg);
      opacity: 0.12;
      pointer-events: none;
      user-select: none;
    }

    .classified-stamp-animated {
      font-weight: 900;
      border: 5px solid #ef4444;
      color: #ef4444;
      padding: 8px 24px;
      text-transform: uppercase;
      transform: rotate(-15deg);
      pointer-events: none;
      user-select: none;
      opacity: 0;
      animation: stamp-appear 10s infinite cubic-bezier(0.19, 1, 0.22, 1);
      background: rgba(239, 68, 68, 0.04);
      letter-spacing: 0.2em;
      white-space: nowrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97) translateY(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes progress {
      0% { width: 0; }
      100% { width: 100%; }
    }

    @keyframes load {
      0% { width: 0; }
      100% { width: 100%; }
    }

    /* Scanline for terminal only */
    .scanline::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script>
    const observerOptions = { threshold: 0.1 };
    const scrollRevealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, observerOptions);

    const observeExisting = () => {
      document.querySelectorAll('.reveal:not(.active)').forEach(el => scrollRevealObserver.observe(el));
    };

    observeExisting();
    const domObserver = new MutationObserver(() => observeExisting());
    domObserver.observe(document.body, { childList: true, subtree: true });
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
